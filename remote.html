<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Awareness Simulation</title>
    <style>
        body {
            background-color: #1a0000;
            color: #ff4d4d;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background-color: #330000;
            border: 2px solid #ff0000;
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px red;
        }

        h1 {
            color: #ff0000;
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
        }

        button {
            background-color: #ff0000;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #cc0000;
        }

        .warning {
            margin-top: 20px;
            font-size: 12px;
            color: #ff9999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Security Verification Required</h1>
    <p>This is a controlled security awareness simulation.</p>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="alert('Simulation only. No data is collected.')">
        Verify
    </button>

    <div class="warning">
        This page is part of a cybersecurity training exercise.
    </div>
</div>

</body>
</html>
